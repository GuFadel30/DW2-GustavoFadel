<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Escolar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Biblioteca Escolar</h1>
        <div class="search-bar">
            <input type="text" id="busca" placeholder="Buscar por título ou autor..." aria-label="Buscar livros">
            <button id="btnExportar" aria-label="Exportar dados">Exportar</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h2>Filtros</h2>
            <form id="filtros">
                <div class="filter-group">
                    <label for="genero">Gênero:</label>
                    <select id="genero" name="genero">
                        <option value="">Todos</option>
                        <option value="Romance">Romance</option>
                        <option value="Ficção">Ficção</option>
                        <option value="Aventura">Aventura</option>
                        <option value="Drama">Drama</option>
                        <option value="Terror">Terror</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="ano">Ano:</label>
                    <input type="number" id="ano" name="ano" min="1900" max="2025">
                </div>

                <div class="filter-group">
                    <label for="status">Status:</label>
                    <select id="status" name="status">
                        <option value="">Todos</option>
                        <option value="Disponível">Disponível</option>
                        <option value="Emprestado">Emprestado</option>
                        <option value="Em Manutenção">Em Manutenção</option>
                    </select>
                </div>
            </form>

            <div class="sort-options">
                <h3>Ordenar por:</h3>
                <button id="sortTitulo" class="sort-btn" aria-label="Ordenar por título">Título</button>
                <button id="sortAno" class="sort-btn" aria-label="Ordenar por ano">Ano</button>
            </div>
        </aside>

        <main>
            <div class="controls">
                <button id="btnNovo" aria-label="Adicionar novo livro">Novo Livro</button>
            </div>

            <div id="listaLivros"></div>

            <div class="pagination">
                <button id="prevPage" aria-label="Página anterior">Anterior</button>
                <span id="currentPage">1</span>
                <button id="nextPage" aria-label="Próxima página">Próxima</button>
            </div>
        </main>
    </div>

    <dialog id="modalLivro" aria-labelledby="modalTitle">
        <form id="formLivro">
            <h2 id="modalTitle">Cadastrar Livro</h2>
            
            <div class="form-group">
                <label for="titulo">Título:*</label>
                <input type="text" id="titulo" name="titulo" required aria-required="true">
            </div>

            <div class="form-group">
                <label for="autor">Autor:*</label>
                <input type="text" id="autor" name="autor" required aria-required="true">
            </div>

            <div class="form-group">
                <label for="anoLivro">Ano:*</label>
                <input type="number" id="anoLivro" name="ano" required min="1900" max="2025" aria-required="true">
            </div>

            <div class="form-group">
                <label for="generoLivro">Gênero:*</label>
                <select id="generoLivro" name="genero" required aria-required="true">
                    <option value="Romance">Romance</option>
                    <option value="Ficção">Ficção</option>
                    <option value="Aventura">Aventura</option>
                    <option value="Drama">Drama</option>
                    <option value="Terror">Terror</option>
                </select>
            </div>

            <div class="form-group">
                <label for="isbn">ISBN:</label>
                <input type="text" id="isbn" name="isbn" pattern="[0-9-]{10,13}">
            </div>

            <div class="form-group">
                <label for="statusLivro">Status:*</label>
                <select id="statusLivro" name="status" required aria-required="true">
                    <option value="Disponível">Disponível</option>
                    <option value="Emprestado">Emprestado</option>
                    <option value="Em Manutenção">Em Manutenção</option>
                </select>
            </div>

            <div class="form-buttons">
                <button type="submit">Salvar</button>
                <button type="button" id="btnCancelar">Cancelar</button>
            </div>
        </form>
    </dialog>

    <dialog id="modalEmprestimo" aria-labelledby="emprestimoTitle">
        <form id="formEmprestimo">
            <h2 id="emprestimoTitle">Empréstimo/Devolução</h2>
            
            <div class="form-group">
                <p id="livroInfo"></p>
                <p id="statusInfo"></p>
            </div>

            <div class="form-buttons">
                <button type="submit" id="btnConfirmarEmprestimo">Confirmar</button>
                <button type="button" id="btnCancelarEmprestimo">Cancelar</button>
            </div>
        </form>
    </dialog>

    <footer>
        <p>&copy; 2025 Biblioteca Escolar - Desenvolvido por Gustavo Fadel</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
